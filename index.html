<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinControl" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2845/2845874.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>FinControl Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes progress {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }
      .animate-progress {
        animation: progress 1.5s infinite ease-in-out;
      }

      /* Custom Scrollbar for Dropdowns */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: #94a3b8;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#0f172a",
              secondary: "#334155",
              accent: "#3b82f6",
              success: "#10b981",
              danger: "#ef4444",
              warning: "#f59e0b",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="bg-gray-50 text-slate-800 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Limpeza agressiva de Service Worker e Caches para resolver tela branca
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      // Limpa todos os caches do navegador para este site
      if (window.caches) {
        caches.keys().then(function(names) {
          for (let name of names) caches.delete(name);
        });
      }
      
      console.log('Cache e Service Worker limpos com sucesso.');
    </script>
  </body>
</html>
